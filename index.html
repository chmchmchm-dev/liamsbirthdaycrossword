<!DOCTYPE html>
<html lang="en">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Birthday Crossword</title>
<style>
  body {
    font-family: "Geist", sans-serif;
    line-height: 1.3;
    padding: 16px;
    color: #133E1D;
    font-size: 12px;
    background-image: url("background_pic.png"); /* or a full URL */
    background-size: 100% auto;   /* fit width, keep aspect ratio */
    background-repeat: repeat-y;  /* repeat vertically only */
    background-position: top center;

    
  }

  h1 {
    text-align: center;
    font-size: 24px;
    margin: 0 0 4px;
  }

  .subtitle {
    text-align: center;
    font-size: 14px;
    margin-bottom: 16px;
    color: #ffffff;
  }

  .layout {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  @media (min-width: 800px) {
    .layout {
      flex-direction: row;
      align-items: flex-start;
    }
  }

  @media (max-width: 600px) {
    body {
      padding-top: 450px;
    }
  }

  #gridArea {
    display: flex;
    align-items: flex-start;
  }

  /* Fixed left column */
  #rowLabels {
  width: 32px;
  flex-shrink: 0;
  margin-top: 32px; /* aligns row labels with the grid */
  }



  /* Scrollable grid area */
  #gridWrapper {
  overflow-x: auto;
  overflow-y: hidden;
  max-width: 100%;
  display: block;
  }

  /* Desktop: wrapper grows to fit the grid, so no scroll needed */
  @media (min-width: 700px) {
    #gridWrapper {
      overflow-x: hidden;
    }
  }


  /* FIXED crossword size */
  #gridContainer {
    display: grid;
    grid-template-columns: 32px auto;
    grid-template-rows: 32px auto;
    width: calc(32px * 13 + 32px);   /* 13 columns + label row*/
    height: calc(32px * 16 + 32px);  /* 16 rows + label row */
  }

  /* Column labels A–M */
  #colLabels {
    grid-column: 2;
    grid-row: 1;
    display: grid;
    grid-template-columns: repeat(13, 32px);
    width: calc(32px * 13);
    height: 32px;
    text-align: center;
    font-size: 12px;
    line-height: 32px;
    font-weight: bold;
    align-items: center;
    justify-items: center;
    color: #ffffff;
  }

  /* Row labels 1–16 */
  #rowLabels {
    grid-column: 1;
    grid-row: 2;
    display: grid;
    grid-template-rows: repeat(16, 32px);
    width: 32px;
    height: calc(32px * 16);
    text-align: center;
    font-size: 12px;
    line-height: 32px;
    font-weight: bold;
    align-items: center;
    justify-items: center;
    color: #ffffff;
  }

  /* Crossword grid */
  #grid {
    grid-column: 2;
    grid-row: 2;
    display: grid;
    grid-template-columns: repeat(13, 32px);
    grid-template-rows: repeat(16, 32px);
    width: calc(32px * 13);
    height: calc(32px * 16);
    gap: 0;
  }

  /* Cells */
  .cell {
    width: 32px;
    height: 32px;
    box-sizing: border-box;
    border-radius: 0;
  }

  /* Black squares */
  .block {
    background: #D9D9D9;
  }

  /* Input cells */
  .cell input {
    width: 100%;
    height: 100%;
    border: 1px solid #ccc;
    border-radius: 0;
    text-align: center;
    font-size: 12px;
    background: white;
    text-transform: uppercase;
    padding: 0;
    margin: 0;
    line-height: 32px;
  }

  /* Active cell focus style */
  .cell input:focus {
    outline: none;
    border-radius: 0;
    border: 1px solid #6CDDEE;
    background: #DDFBFF; /* light blue */
  }

  .cell input.correct {
    background: #c8f7c5;
    border-color: #4caf50;
  }

  .cell input.incorrect {
    background: #ffd6d6;
    border-color: #e53935;
  }

  .cell input.anagram {
    background: #FED766;
    border-color: #FED766;
  }

  /* Buttons */
  .controls {
    margin-top: 16px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  button {
    flex: 1;
    min-width: 120px;
    padding: 10px 12px;
    font-size: 16px;
    font-family: "Geist", sans-serif;
    border-radius: 48px;
    border: none;
    font-weight: 600;
    color: #133E1D;
    background: #FED766;
  }

  button.secondary {
    background: #EFF1F3;
  }

  /* Clues */
  .clues {
    background: rgba(239, 241, 243,0.8);
    padding: 12px 18px;
    border-radius: 8px;
    font-size: 12px;
    font-color: #133E1D;
    margin-top: 16px; /* padding space between crossword and clues */
    margin-bottom: 32px;
  }

  .clues h2 {
    margin-top: 0;
    font-size: 14px;
  }

  .clue-item {
    margin-bottom: 8px;
  }


  .clue-label {
    font-weight: 600;
  }

  .clue-meta {
    font-size: 11px;
    font-style: italic;
    font-weight: 200;
  }
</style>
</head>
<body>

 <div class="layout">

  <div id="gridArea">

    <!-- FIXED left column -->
    <div id="rowLabels"></div>

    <!-- SCROLLABLE right side -->
    <div id="gridWrapper">
      <div id="gridContainer">
        <div id="colLabels"></div>
        <div id="grid"></div>
      </div>
    </div>

  </div>

</div>

<div class="controls">
  <button id="checkBtn">Check answers</button>
</div>

<div class="clues">
  <h2>Clues</h2>
  <div id="clueList"></div>
</div>

<script>
  // Rows = 1–16, Columns = A–M
  const ROWS = Array.from({ length: 16 }, (_, i) => i + 1); // [1..16]
  const COLS = "ABCDEFGHIJKLM".split("");                  // A–M

  const words = [
    {
      number: 1,
      answer: "BIRTHDAY",
      clue: "Today is your ________?",
      start: "B1",
      end: "I1"
    },
    {
      number: 2,
      answer: "LIAM",
      clue: "Your first name",
      start: "E13",
      end: "E16"
    },
    {
      number: 3,
      answer: "WILD",
      clue: "We enjoyed our Ceilidh dancing at Bonnie & ____.",
      start: "G8",
      end: "J8"
    },
    {
      number: 4,
      answer: "NATIONAL GALLERY",
      clue: "It's home to world-class international and Scottish art from 1300 to 1945. We are going to have brunch at their cafe.",
      start: "I15",
      end: "I1"
    },
    {
      number: 5,
      answer: "JD",
      clue: "Head to this sports shop on Hanover Street to get your birthday present",
      start: "D5",
      end: "E5"
    },
    {
      number: 6,
      answer: "SCOTLAND TOP",
      clue: "What did you get for birthday present?",
      start: "A13",
      end: "K13"
    },
    {
      number: 7,
      answer: "WATERSTONES",
      clue: "Bookshop on Princes Street",
      start: "A10",
      end: "K10"
    },
    {
      number: 8,
      answer: "SLATEFORD",
      clue: "Train station closest to your flat",
      start: "C7",
      end: "C15"
    },
    {
      number: 9,
      answer: "WATSON",
      clue: "Your last name",
      start: "G8",
      end: "G13"
    },
    {
      number: 10,
      answer: "IAN RANKIN",
      clue: "Author of Fleshmarket Close",
      start: "E6",
      end: "M6"
    },
    {
      number: 11,
      answer: "EDINBURG",
      clue: "The enchanting historic city we met, fell in love and live in",
      start: "E4",
      end: "E11"
    },
    {
      number: 12,
      answer: "LATTE",
      clue: "What coffee did you have for drink this morning?",
      start: "I4",
      end: "E4"
    }
  ];

  const clueGroups = [
    [1, 2, 3, 4],      // Group 1
    [5, 6],            // Group 2
    [7, 8, 9, 10],     // Group 3
    [11, 12]           // Group 4
  ];

  
  // Parse coordinates like "C1" => { rowIndex, colIndex }
  function parseCoord(coord) {
    const colLetter = coord[0];                 // A–M
    const rowNumber = parseInt(coord.slice(1), 10); // 1–16
    const rowIndex = ROWS.indexOf(rowNumber);
    const colIndex = COLS.indexOf(colLetter);
    return { row: rowIndex, col: colIndex };
  }

  // Build empty grid
  const grid = Array.from({ length: ROWS.length }, () =>
    Array.from({ length: COLS.length }, () => null)
  );

  // Place words into grid
  words.forEach((w, wi) => {
    const cleanAnswer = w.answer.replace(/\s+/g, "").toUpperCase();
    const start = parseCoord(w.start);
    const end = parseCoord(w.end);

    const dr = Math.sign(end.row - start.row);
    const dc = Math.sign(end.col - start.col);

    let r = start.row;
    let c = start.col;

    for (let i = 0; i < cleanAnswer.length; i++) {
      const letter = cleanAnswer[i];
      if (!grid[r][c]) {
        grid[r][c] = {
          solution: letter,
          words: [wi],
          posInWord: [i] // position index within this word
        };
      } else {
        // Overlap: ensure same letter
        if (grid[r][c].solution !== letter) {
          console.warn("Letter conflict at", r, c, "for word", w.number);
        }
        grid[r][c].words.push(wi);
        grid[r][c].posInWord.push(i);
      }
      r += dr;
      c += dc;
    }
  });


  // Render column labels
  const colLabels = document.getElementById("colLabels");
  COLS.forEach(letter => {
    const div = document.createElement("div");
    div.textContent = letter;
    colLabels.appendChild(div);
  });

  // Render row labels
  const rowLabels = document.getElementById("rowLabels");
  ROWS.forEach(num => {
    const div = document.createElement("div");
    div.textContent = num;
    rowLabels.appendChild(div);
  });

  // Render grid
  const gridEl = document.getElementById("grid");
  const cellInputs = []; // store references for checking and auto-tabbing

  for (let r = 0; r < ROWS.length; r++) {
    for (let c = 0; c < COLS.length; c++) {
      const cellData = grid[r][c];
      const cellDiv = document.createElement("div");
      cellDiv.className = "cell";

      if (!cellData) {
        cellDiv.classList.add("block");
      } else {
        const input = document.createElement("input");
        input.maxLength = 1;
        input.dataset.row = r;
        input.dataset.col = c;
        input.autocomplete = "off";
        input.spellcheck = false;
        input.inputMode = "text";

        input.addEventListener("input", (e) => {
          const val = e.target.value.toUpperCase().slice(0, 1);
          e.target.value = val;
          e.target.classList.remove("correct", "incorrect");

          // Auto-tab to next cell in the first word this cell belongs to
          if (val) {
            const row = parseInt(e.target.dataset.row, 10);
            const col = parseInt(e.target.dataset.col, 10);
            const cd = grid[row][col];
            if (cd && cd.words && cd.words.length > 0) {
              const wi = cd.words[0]; // first word index
              const w = words[wi];
              const start = parseCoord(w.start);
              const end = parseCoord(w.end);
              const dr = Math.sign(end.row - start.row);
              const dc = Math.sign(end.col - start.col);

              // find position index of this cell in that word
              const cleanAnswer = w.answer.replace(/\s+/g, "").toUpperCase();
              let rPos = start.row;
              let cPos = start.col;
              let foundIndex = 0;
              for (let i = 0; i < cleanAnswer.length; i++) {
                if (rPos === row && cPos === col) {
                  foundIndex = i;
                  break;
                }
                rPos += dr;
                cPos += dc;
              }

              const nextIndex = foundIndex + 1;
              if (nextIndex < cleanAnswer.length) {
                let nr = start.row + dr * nextIndex;
                let nc = start.col + dc * nextIndex;
                const nextInput = cellInputs.find(ci =>
                  parseInt(ci.input.dataset.row, 10) === nr &&
                  parseInt(ci.input.dataset.col, 10) === nc
                );
                if (nextInput) {
                  nextInput.input.focus();
                }
              }
            }
          }
        });

        cellDiv.appendChild(input);
        cellInputs.push({ input, cellData });
      }

      gridEl.appendChild(cellDiv);
    }
  }

  // Render clues (no answers shown)
  const clueListEl = document.getElementById("clueList");

  clueGroups.forEach((group, groupIndex) => {
    const groupDiv = document.createElement("div");
    groupDiv.className = "clue-group";
    groupDiv.dataset.group = groupIndex;

    if (groupIndex > 0) {
      groupDiv.style.display = "none"; // hide all except group 0
    }

    group.forEach(num => {
      const w = words.find(w => w.number === num);
      const item = document.createElement("div");
      item.className = "clue-item";

      const s = parseCoord(w.start);
      const e = parseCoord(w.end);
      let dirText;
      if (s.row === e.row) {
        dirText = (e.col > s.col) ? "Across" : "Across (backwards)";
      } else {
        dirText = (e.row > s.row) ? "Down" : "Down (backwards)";
      }

      item.innerHTML = `
        <div><span class="clue-label">${w.number}.</span> ${w.clue}</div>
        <div class="clue-meta">${dirText}, from ${w.start} to ${w.end}</div>
      `;

      groupDiv.appendChild(item);
    });

    clueListEl.appendChild(groupDiv);
  });

  // Check answers
    document.getElementById("checkBtn").addEventListener("click", () => {
    // existing correctness coloring
    cellInputs.forEach(({ input, cellData }) => {
      const val = (input.value || "").toUpperCase();
      if (!val) {
        input.classList.remove("correct", "incorrect");
        return;
      }
      if (val === cellData.solution) {
        input.classList.add("correct");
        input.classList.remove("incorrect");
      } else {
        input.classList.add("incorrect");
        input.classList.remove("correct");
      }
    });

    // reveal next clue group
    for (let i = 0; i < clueGroups.length - 1; i++) {
      const groupDiv = document.querySelector(`.clue-group[data-group="${i}"]`);
      const nextGroupDiv = document.querySelector(`.clue-group[data-group="${i+1}"]`);

      if (groupDiv && nextGroupDiv && nextGroupDiv.style.display === "none") {
        if (isGroupCorrect(clueGroups[i])) {
          nextGroupDiv.style.display = "block";
        }
        break;
      }
    }

    // FINAL CHECK — all words correct?
    if (areAllWordsCorrect()) {
      highlightFinalClueCells();
      alert("Congrats! You've cracked the crossword. Now you get your final clue. Solve the anagram.");
    }

  });


  // Check if a group is fully correct
    function isGroupCorrect(group) {
    return group.every(num => {
      const w = words.find(w => w.number === num);
      const cleanAnswer = w.answer.replace(/\s+/g, "").toUpperCase();

      const start = parseCoord(w.start);
      const end = parseCoord(w.end);
      const dr = Math.sign(end.row - start.row);
      const dc = Math.sign(end.col - start.col);

      let r = start.row;
      let c = start.col;

      for (let i = 0; i < cleanAnswer.length; i++) {
        const expected = cleanAnswer[i];
        const input = cellInputs.find(ci =>
          parseInt(ci.input.dataset.row, 10) === r &&
          parseInt(ci.input.dataset.col, 10) === c
        );

        if (!input || input.input.value.toUpperCase() !== expected) {
          return false;
        }

        r += dr;
        c += dc;
      }

      return true;
    });
  }


  function areAllWordsCorrect() {
    return words.every(w => {
      const cleanAnswer = w.answer.replace(/\s+/g, "").toUpperCase();
      const start = parseCoord(w.start);
      const end = parseCoord(w.end);
      const dr = Math.sign(end.row - start.row);
      const dc = Math.sign(end.col - start.col);

      let r = start.row;
      let c = start.col;

      for (let i = 0; i < cleanAnswer.length; i++) {
        const expected = cleanAnswer[i];
        const input = cellInputs.find(ci =>
          parseInt(ci.input.dataset.row, 10) === r &&
          parseInt(ci.input.dataset.col, 10) === c
        );

        if (!input || input.input.value.toUpperCase() !== expected) {
          return false;
        }

        r += dr;
        c += dc;
      }

      return true;
    });
  }

  function highlightFinalClueCells() {
    const coords = ["E1", "F1", "I3", "E4", "F6", "C10", "G10", "E11", "B13", "J13"];

    coords.forEach(coord => {
      const { row, col } = parseCoord(coord);
      const cell = cellInputs.find(ci =>
        parseInt(ci.input.dataset.row, 10) === row &&
        parseInt(ci.input.dataset.col, 10) === col
      );

      if (cell) {
        // Remove green/red classes so they don't override the highlight
        cell.input.classList.remove("correct", "incorrect");

        // Add your highlight class
        cell.input.classList.add("anagram");
      }
    });
  }




</script>

</body>
</html>
