<!DOCTYPE html>
<html lang="en">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Birthday Crossword</title>
<style>
  body {
    font-family: "Geist", sans-serif;
    line-height: 1.3;
    padding: 16px;
    background: linear-gradient(135deg, #ffe8f0, #e6f0ff);
    color: #ffffff;
    font-size: 12px;
  }

  h1 {
    text-align: center;
    font-size: 24px;
    margin: 0 0 4px;
  }

  .subtitle {
    text-align: center;
    font-size: 14px;
    margin-bottom: 16px;
    color: #ffffff;
  }

  .layout {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  @media (min-width: 800px) {
    .layout {
      flex-direction: row;
      align-items: flex-start;
    }
  }

  /* Wrapper: allow horizontal scroll on small screens, no vertical scrollbar */
  #gridWrapper {
    overflow-x: auto;
    overflow-y: hidden;
  }

  /* FIXED crossword size */
  #gridContainer {
    display: grid;
    grid-template-columns: 32px auto;
    grid-template-rows: 32px auto;
    width: calc(32px * 14 + 32px);   /* 14 columns + label column */
    height: calc(32px * 16 + 32px);  /* 16 rows + label row */
  }

  /* Column labels A–N */
  #colLabels {
    grid-column: 2;
    grid-row: 1;
    display: grid;
    grid-template-columns: repeat(14, 32px);
    width: calc(32px * 14);
    height: 32px;
    text-align: center;
    font-size: 12px;
    line-height: 32px;
    font-weight: bold;
    align-items: center;
    justify-items: center;
  }

  /* Row labels 1–16 */
  #rowLabels {
    grid-column: 1;
    grid-row: 2;
    display: grid;
    grid-template-rows: repeat(16, 32px);
    width: 32px;
    height: calc(32px * 16);
    text-align: center;
    font-size: 12px;
    line-height: 32px;
    font-weight: bold;
    align-items: center;
    justify-items: center;
  }

  /* Crossword grid */
  #grid {
    grid-column: 2;
    grid-row: 2;
    display: grid;
    grid-template-columns: repeat(14, 32px);
    grid-template-rows: repeat(16, 32px);
    width: calc(32px * 14);
    height: calc(32px * 16);
    gap: 0;
  }

  /* Cells */
  .cell {
    width: 32px;
    height: 32px;
    box-sizing: border-box;
    border-radius: 0;
  }

  /* Black squares */
  .block {
    background: #696773;
  }

  /* Input cells */
  .cell input {
    width: 100%;
    height: 100%;
    border: 1px solid #ccc;
    border-radius: 0;
    text-align: center;
    font-size: 12px;
    background: white;
    text-transform: uppercase;
    padding: 0;
    margin: 0;
    line-height: 32px;
  }

  /* Active cell focus style */
  .cell input:focus {
    outline: none;
    border-radius: 0;
    border: 1px solid #6CDDEE;
    background: #DDFBFF; /* light blue */
  }

  .cell input.correct {
    background: #c8f7c5;
    border-color: #4caf50;
  }

  .cell input.incorrect {
    background: #ffd6d6;
    border-color: #e53935;
  }

  /* Buttons */
  .controls {
    margin-top: 8px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  button {
    flex: 1;
    min-width: 120px;
    padding: 10px 12px;
    font-size: 12px;
    border-radius: 8px;
    border: none;
    font-weight: 600;
    color: white;
    background: #FED766;
  }

  button.secondary {
    background: #EFF1F3;
  }

  /* Clues */
  .clues {
    background: rgba(239, 241, 243,0.8);
    padding: 12px 18px;
    border-radius: 8px;
    font-size: 12px;
    margin-top: 16px; /* padding space between crossword and clues */
  }

  .clues h2 {
    margin-top: 0;
    font-size: 14px;
  }

  .clue-item {
    margin-bottom: 8px;
  }

  .clue-label {
    font-weight: 700;
  }

  .clue-meta {
    font-size: 11px;
    color: #133E1D;
  }
</style>
</head>
<body>


<div class="layout">
  <div>
    <div id="gridWrapper">
      <div id="gridContainer">
        <div id="colLabels"></div>
        <div id="rowLabels"></div>
        <div id="grid"></div>
      </div>
    </div>
    <div class="controls">
      <button id="checkBtn">Check answers</button>
    </div>
  </div>

  <div class="clues">
    <h2>Clues</h2>
    <div id="clueList"></div>
  </div>
</div>

<script>
  // Rows = 1–16, Columns = A–N
  const ROWS = Array.from({ length: 16 }, (_, i) => i + 1); // [1..16]
  const COLS = "ABCDEFGHIJKLMN".split("");                  // A–N

  const words = [
    {
      number: 1,
      answer: "BIRTHDAY",
      clue: "Today is your ___?",
      start: "C1",
      end: "J1"
    },
    {
      number: 2,
      answer: "LIAM",
      clue: "Your first name",
      start: "F13",
      end: "F16"
    },
    {
      number: 3,
      answer: "WILD",
      clue: "We enjoyed our Ceilidh dancing at Bonnie & __.",
      start: "H8",
      end: "K8"
    },
    {
      number: 4,
      answer: "NATIONAL GALLERY",
      clue: "It's home to world-class international and Scottish art from 1300 to 1945. We are going to have brunch at their cafe.",
      start: "J15",
      end: "J1"
    },
    {
      number: 5,
      answer: "JD",
      clue: "Head to this sports shop on Hanover Street to get your birthday present",
      start: "E5",
      end: "F5"
    },
    {
      number: 6,
      answer: "SCOTLAND TOP",
      clue: "What did you get for birthday present?",
      start: "B13",
      end: "L13"
    },
    {
      number: 7,
      answer: "WATERSTONES",
      clue: "Bookshop on Princes Street",
      start: "B10",
      end: "L10"
    },
    {
      number: 8,
      answer: "SLATEFORD",
      clue: "Train station closest to your flat",
      start: "D7",
      end: "D15"
    },
    {
      number: 9,
      answer: "WATSON",
      clue: "Your last name",
      start: "H8",
      end: "H13"
    },
    {
      number: 10,
      answer: "IAN RANKIN",
      clue: "Author of Fleshmarket Close",
      start: "F6",
      end: "N6"
    },
    {
      number: 11,
      answer: "EDINBURGH",
      clue: "The enchanting historic city we met, fell in love and live in",
      start: "F4",
      end: "F11"
    },
    {
      number: 12,
      answer: "LATTE",
      clue: "What coffee did you have for drink this morning?",
      start: "J4",
      end: "F4"
    }
  ];

  // Parse coordinates like "C1" => { rowIndex, colIndex }
  function parseCoord(coord) {
    const colLetter = coord[0];                 // A–N
    const rowNumber = parseInt(coord.slice(1), 10); // 1–16
    const rowIndex = ROWS.indexOf(rowNumber);
    const colIndex = COLS.indexOf(colLetter);
    return { row: rowIndex, col: colIndex };
  }

  // Build empty grid
  const grid = Array.from({ length: ROWS.length }, () =>
    Array.from({ length: COLS.length }, () => null)
  );

  // Place words into grid
  words.forEach((w, wi) => {
    const cleanAnswer = w.answer.replace(/\s+/g, "").toUpperCase();
    const start = parseCoord(w.start);
    const end = parseCoord(w.end);

    const dr = Math.sign(end.row - start.row);
    const dc = Math.sign(end.col - start.col);

    let r = start.row;
    let c = start.col;

    for (let i = 0; i < cleanAnswer.length; i++) {
      const letter = cleanAnswer[i];
      if (!grid[r][c]) {
        grid[r][c] = {
          solution: letter,
          words: [wi],
          posInWord: [i] // position index within this word
        };
      } else {
        // Overlap: ensure same letter
        if (grid[r][c].solution !== letter) {
          console.warn("Letter conflict at", r, c, "for word", w.number);
        }
        grid[r][c].words.push(wi);
        grid[r][c].posInWord.push(i);
      }
      r += dr;
      c += dc;
    }
  });

  // Force F12 to be black (should be empty)
  const fCol = COLS.indexOf("F");
  const row12 = ROWS.indexOf(12);
  if (grid[row12][fCol]) {
    grid[row12][fCol] = null;
  }

  // Render column labels
  const colLabels = document.getElementById("colLabels");
  COLS.forEach(letter => {
    const div = document.createElement("div");
    div.textContent = letter;
    colLabels.appendChild(div);
  });

  // Render row labels
  const rowLabels = document.getElementById("rowLabels");
  ROWS.forEach(num => {
    const div = document.createElement("div");
    div.textContent = num;
    rowLabels.appendChild(div);
  });

  // Render grid
  const gridEl = document.getElementById("grid");
  const cellInputs = []; // store references for checking and auto-tabbing

  for (let r = 0; r < ROWS.length; r++) {
    for (let c = 0; c < COLS.length; c++) {
      const cellData = grid[r][c];
      const cellDiv = document.createElement("div");
      cellDiv.className = "cell";

      if (!cellData) {
        cellDiv.classList.add("block");
      } else {
        const input = document.createElement("input");
        input.maxLength = 1;
        input.dataset.row = r;
        input.dataset.col = c;
        input.autocomplete = "off";
        input.spellcheck = false;
        input.inputMode = "text";

        input.addEventListener("input", (e) => {
          const val = e.target.value.toUpperCase().slice(0, 1);
          e.target.value = val;
          e.target.classList.remove("correct", "incorrect");

          // Auto-tab to next cell in the first word this cell belongs to
          if (val) {
            const row = parseInt(e.target.dataset.row, 10);
            const col = parseInt(e.target.dataset.col, 10);
            const cd = grid[row][col];
            if (cd && cd.words && cd.words.length > 0) {
              const wi = cd.words[0]; // first word index
              const w = words[wi];
              const start = parseCoord(w.start);
              const end = parseCoord(w.end);
              const dr = Math.sign(end.row - start.row);
              const dc = Math.sign(end.col - start.col);

              // find position index of this cell in that word
              const cleanAnswer = w.answer.replace(/\s+/g, "").toUpperCase();
              let rPos = start.row;
              let cPos = start.col;
              let foundIndex = 0;
              for (let i = 0; i < cleanAnswer.length; i++) {
                if (rPos === row && cPos === col) {
                  foundIndex = i;
                  break;
                }
                rPos += dr;
                cPos += dc;
              }

              const nextIndex = foundIndex + 1;
              if (nextIndex < cleanAnswer.length) {
                let nr = start.row + dr * nextIndex;
                let nc = start.col + dc * nextIndex;
                const nextInput = cellInputs.find(ci =>
                  parseInt(ci.input.dataset.row, 10) === nr &&
                  parseInt(ci.input.dataset.col, 10) === nc
                );
                if (nextInput) {
                  nextInput.input.focus();
                }
              }
            }
          }
        });

        cellDiv.appendChild(input);
        cellInputs.push({ input, cellData });
      }

      gridEl.appendChild(cellDiv);
    }
  }

  // Render clues (no answers shown)
  const clueListEl = document.getElementById("clueList");
  words.forEach((w) => {
    const item = document.createElement("div");
    item.className = "clue-item";

    const s = parseCoord(w.start);
    const e = parseCoord(w.end);
    let dirText;
    if (s.row === e.row) {
      dirText = (e.col > s.col) ? "Across" : "Across (backwards)";
    } else {
      dirText = (e.row > s.row) ? "Down" : "Down (backwards)";
    }

    item.innerHTML = `
      <div><span class="clue-label">${w.number}.</span> ${w.clue}</div>
      <div class="clue-meta">${dirText}, from ${w.start} to ${w.end}</div>
    `;
    clueListEl.appendChild(item);
  });

  // Check answers
  document.getElementById("checkBtn").addEventListener("click", () => {
    cellInputs.forEach(({ input, cellData }) => {
      const val = (input.value || "").toUpperCase();
      if (!val) {
        input.classList.remove("correct", "incorrect");
        return;
      }
      if (val === cellData.solution) {
        input.classList.add("correct");
        input.classList.remove("incorrect");
      } else {
        input.classList.add("incorrect");
        input.classList.remove("correct");
      }
    });
  });

</script>

</body>
</html>
